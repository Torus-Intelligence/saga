saga_id: low-confidence-classification
harness_version: 1
duration_days: 3
app:
  name: toy-support-desk
cast:
  - id: sarah
    display_name: Sarah Chen
    role: support_engineer
  - id: tom
    display_name: Tom (customer)
    role: customer
events:
  - at: 2026-06-20T10:00:00Z
    kind: customer_files_ticket
    customer: tom@example.com
    subject: Unclear request
    body: I need something changed but cannot describe the category yet.
    expected_effects:
      - effect: TicketCreated
        customer: tom@example.com

  - at: 2026-06-20T10:20:00Z
    kind: agent_classifies
    low_confidence_threshold: 0.5
    expected_effects:
      - effect: TicketClassified
      - effect: ResponseDrafted
      - effect: EngineerApprovalRequested
        engineer: sarah-chen

  - at: 2026-06-20T13:00:00Z
    kind: engineer_reviews
    engineer: sarah
    decision: approve
    expected_effects:
      - effect: EngineerApproved
        engineer: sarah
      - effect: ResponseSent
