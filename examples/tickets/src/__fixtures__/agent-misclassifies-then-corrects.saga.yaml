saga_id: agent-misclassifies-then-corrects
harness_version: 1
duration_days: 5
app:
  name: toy-support-desk
cast:
  - id: sarah
    display_name: Sarah Chen
    role: support_engineer
  - id: priya
    display_name: Priya (customer)
    role: customer
events:
  - at: 2026-08-01T09:00:00Z
    kind: customer_files_ticket
    customer: priya@example.com
    subject: Refund or technical help
    body: I had a payment error, not sure if technical or billing. Please help.
    expected_effects:
      - effect: TicketCreated
        customer: priya@example.com

  - at: 2026-08-01T09:30:00Z
    kind: agent_classifies
    expected_effects:
      - effect: TicketClassified
      - effect: ResponseDrafted

  - at: 2026-08-01T13:00:00Z
    kind: engineer_reviews
    engineer: sarah
    decision: reject
    reject_reason: wrong_category
    expected_effects:
      - effect: EngineerApprovalRequested
        engineer: sarah

  - at: 2026-08-02T09:00:00Z
    kind: agent_classifies
    expected_effects:
      - effect: TicketClassified
      - effect: ResponseDrafted

  - at: 2026-08-02T11:00:00Z
    kind: engineer_reviews
    engineer: sarah
    decision: approve
    expected_effects:
      - effect: EngineerApproved
        engineer: sarah
      - effect: ResponseSent
