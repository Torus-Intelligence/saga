saga_id: simple-ticket-resolution
harness_version: 1
duration_days: 3
app:
  name: toy-support-desk
cast:
  - id: sarah
    display_name: Sarah Chen
    role: support_engineer
  - id: alex
    display_name: Alex (customer)
    role: customer
events:
  - at: 2026-06-01T09:00:00Z
    kind: customer_files_ticket
    customer: alex@example.com
    subject: Export button broken on dashboard
    body: I am getting an error when I try to export the dashboard. The button is broken and the page fails to respond. Stuck on this.
    expected_effects:
      - effect: TicketCreated
        customer: alex@example.com
        subject_contains: export

  - at: 2026-06-01T09:15:00Z
    kind: agent_classifies
    expected_effects:
      - effect: TicketClassified
        category: technical
      - effect: ResponseDrafted
        category: technical

  - at: 2026-06-01T10:30:00Z
    kind: engineer_reviews
    engineer: sarah
    decision: approve
    expected_effects:
      - effect: EngineerApproved
        engineer: sarah
      - effect: ResponseSent
        to_customer: alex@example.com

  - at: 2026-06-02T14:00:00Z
    kind: customer_follow_up
    customer: alex@example.com
    kind_of_response: satisfaction_survey
    rating: 5
    expected_effects:
      - effect: SatisfactionSurveyReceived
        exact_rating: 5
