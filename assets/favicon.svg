<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Saga">
  <defs>
    <linearGradient id="eq" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F2A24C"/>
      <stop offset="50%"  stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#F2A24C"/>
    </linearGradient>
  </defs>

  <!-- Warm ink tile so the amber mark pops on any browser tab, light or dark -->
  <rect width="64" height="64" rx="15" fill="#2A211A"/>

  <!-- Saga's torus donut, simplified to read at 16px -->
  <g stroke-linecap="round" fill="none">
    <ellipse cx="32" cy="22.5" rx="17" ry="6"   stroke="#E67E22" stroke-opacity="0.55" stroke-width="3.4"/>
    <ellipse cx="32" cy="32"   rx="20" ry="7.5" stroke="url(#eq)" stroke-width="4.6"/>
    <ellipse cx="32" cy="41.5" rx="17" ry="6"   stroke="#E67E22" stroke-opacity="0.55" stroke-width="3.4"/>
  </g>
  <ellipse cx="32" cy="32" rx="6.6" ry="2.6" fill="#E67E22" fill-opacity="0.18" stroke="#F2A24C" stroke-width="2.6"/>
</svg>
