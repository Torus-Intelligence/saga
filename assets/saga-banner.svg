<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Saga README banner</title>
  <desc id="desc">A friendly developer-tool banner showing story files flowing through code into verified workflow effects.</desc>
  <defs>
    <radialGradient id="glowA" cx="18%" cy="18%" r="80%">
      <stop offset="0" stop-color="#3346ff" stop-opacity="0.28"/>
      <stop offset="0.46" stop-color="#172230" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0b1117"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="18%" r="70%">
      <stop offset="0" stop-color="#2fc78f" stop-opacity="0.22"/>
      <stop offset="0.48" stop-color="#101b22" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0b1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.16"/>
      <stop offset="0.28" stop-color="#9aa6ff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#41d3a2" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#ffd166" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff8f70" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151f28"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font: 800 58px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f6f8fb; letter-spacing: 0; }
      .sub { font: 500 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #aeb9c5; letter-spacing: 0; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #e8edf3; }
      .code { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #9fb0c2; }
      .muted { fill: #718091; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#0b1117"/>
  <rect width="1200" height="420" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glowB)"/>

  <g opacity="0.22">
    <path d="M-40 314C104 239 244 265 368 210C523 142 619 246 764 174C902 105 1001 141 1244 64" fill="none" stroke="#e8edf3" stroke-width="1.2"/>
    <path d="M-30 334C112 265 262 289 394 230C536 166 637 274 783 202C925 132 1022 172 1242 101" fill="none" stroke="#e8edf3" stroke-width="1"/>
    <path d="M-20 354C116 292 282 313 420 252C554 193 657 301 804 231C947 163 1039 204 1234 141" fill="none" stroke="#e8edf3" stroke-width="0.8"/>
  </g>

  <g transform="translate(76 82)">
    <text class="title" x="0" y="0">Saga</text>
    <text class="sub" x="2" y="42">Workflow stories that run against real code.</text>

    <g transform="translate(2 78)">
      <rect width="132" height="34" rx="17" fill="#202b36" stroke="#334355"/>
      <circle cx="20" cy="17" r="5" fill="#ffd166"/>
      <text class="label" x="34" y="22">YAML</text>

      <rect x="148" width="150" height="34" rx="17" fill="#173328" stroke="#2f7258"/>
      <circle cx="168" cy="17" r="5" fill="#41d3a2"/>
      <text class="label" x="182" y="22">injectors</text>

      <rect x="314" width="144" height="34" rx="17" fill="#332b17" stroke="#7e6422"/>
      <circle cx="334" cy="17" r="5" fill="#ffd166"/>
      <text class="label" x="348" y="22">effects</text>
    </g>
  </g>

  <g transform="translate(80 270)" opacity="0.88">
    <text class="code mono" x="0" y="0">customer_files_ticket</text>
    <text class="code mono muted" x="0" y="26">  save: ticket_id</text>
    <text class="code mono" x="0" y="52">engineer_reviews</text>
  </g>

  <path d="M310 286C438 214 524 287 642 216C764 143 870 176 1018 118" fill="none" stroke="url(#rail)" stroke-width="4" stroke-linecap="round"/>
  <path d="M310 286C438 214 524 287 642 216C764 143 870 176 1018 118" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.05"/>

  <g filter="url(#shadow)">
    <g transform="translate(405 214)">
      <rect width="214" height="104" rx="16" fill="url(#card)" stroke="#263544"/>
      <text class="label" x="22" y="34">story fixture</text>
      <rect x="22" y="52" width="150" height="9" rx="4.5" fill="#ffd166" opacity="0.72"/>
      <rect x="22" y="72" width="116" height="9" rx="4.5" fill="#6e7f91" opacity="0.55"/>
      <circle cx="182" cy="31" r="12" fill="#ffd166" opacity="0.95"/>
    </g>

    <g transform="translate(628 139)">
      <rect width="224" height="116" rx="16" fill="url(#card)" stroke="#263544"/>
      <text class="label" x="22" y="35">adapter</text>
      <text class="code mono" x="22" y="62">dispatch(event)</text>
      <rect x="22" y="78" width="162" height="10" rx="5" fill="#41d3a2" opacity="0.65"/>
      <rect x="22" y="96" width="96" height="8" rx="4" fill="#6e7f91" opacity="0.45"/>
    </g>

    <g transform="translate(880 181)">
      <rect width="226" height="118" rx="18" fill="#111a22" stroke="#2b3b4b"/>
      <text class="label" x="22" y="36">typed effects</text>
      <g transform="translate(22 58)">
        <rect width="68" height="26" rx="13" fill="#41d3a2"/>
        <rect x="82" width="72" height="26" rx="13" fill="#7c8cff" opacity="0.85"/>
        <rect x="168" width="28" height="26" rx="13" fill="#ffd166" opacity="0.9"/>
      </g>
      <g transform="translate(22 94)">
        <path d="M0 0h130" stroke="#344657" stroke-width="8" stroke-linecap="round"/>
        <path d="M0 0h86" stroke="#41d3a2" stroke-width="8" stroke-linecap="round"/>
        <circle cx="164" cy="0" r="17" fill="#41d3a2"/>
        <path d="M156 -1l6 7 12 -15" fill="none" stroke="#07120f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <g transform="translate(996 64)" filter="url(#softGlow)" opacity="0.9">
    <ellipse cx="0" cy="-26" rx="78" ry="28" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.26"/>
    <ellipse cx="0" cy="0" rx="96" ry="36" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.38"/>
    <ellipse cx="0" cy="26" rx="78" ry="28" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.22"/>
  </g>
</svg>
