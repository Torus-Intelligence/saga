<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Saga workflow testing banner</title>
  <desc id="desc">A marketing-style illustration showing YAML workflow stories flowing through injectors into typed effects and a passing result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="0.45" stop-color="#ecfbf5"/>
      <stop offset="1" stop-color="#f4f0ff"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff2d6"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff8ef"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#15313d" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15313d" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17252f; }
      .small { font: 600 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616d; }
      .tiny { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #3d4d59; }
      .hero { font: 800 72px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12212b; letter-spacing: 0; }
      .tagline { font: 600 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4d5c67; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>

  <path d="M52 346C205 264 290 367 431 284C580 196 670 263 792 189C930 105 1016 154 1146 82" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" opacity="0.9"/>
  <path d="M52 346C205 264 290 367 431 284C580 196 670 263 792 189C930 105 1016 154 1146 82" fill="none" stroke="#2ebc8b" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 18" opacity="0.85"/>

  <g transform="translate(70 58)">
    <text class="hero" x="0" y="76">Saga</text>
    <text class="tagline" x="4" y="116">Story-shaped tests for real backend workflows.</text>
    <g transform="translate(4 148)">
      <rect width="150" height="34" rx="17" fill="#12212b"/>
      <text x="18" y="23" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="800" fill="#ffffff">YAML stories</text>
      <rect x="166" width="126" height="34" rx="17" fill="#2ebc8b"/>
      <text x="184" y="23" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="800" fill="#0c2d23">real code</text>
      <rect x="308" width="150" height="34" rx="17" fill="#ffcf6e"/>
      <text x="327" y="23" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="800" fill="#3a2a08">typed effects</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(110 262) rotate(-6)">
      <rect width="210" height="116" rx="18" fill="url(#cardA)" stroke="#ffffff" stroke-width="2"/>
      <circle cx="30" cy="30" r="10" fill="#ffbd4a"/>
      <rect x="52" y="22" width="116" height="16" rx="8" fill="#f0a63b" opacity="0.55"/>
      <rect x="30" y="55" width="150" height="10" rx="5" fill="#d9b56a" opacity="0.55"/>
      <rect x="30" y="75" width="108" height="10" rx="5" fill="#d9b56a" opacity="0.42"/>
      <text class="tiny" x="30" y="101">day 1 -> day 6</text>
    </g>

    <g transform="translate(390 210)">
      <rect width="230" height="128" rx="20" fill="url(#cardB)" stroke="#ffffff" stroke-width="2"/>
      <text class="label" x="28" y="42">Injectors</text>
      <text class="small" x="28" y="70">call product code</text>
      <rect x="28" y="88" width="174" height="14" rx="7" fill="#2ebc8b" opacity="0.35"/>
      <rect x="28" y="108" width="124" height="10" rx="5" fill="#2ebc8b" opacity="0.25"/>
    </g>

    <g transform="translate(680 135) rotate(4)">
      <rect width="230" height="128" rx="20" fill="url(#cardC)" stroke="#ffffff" stroke-width="2"/>
      <text class="label" x="28" y="42">Effects</text>
      <text class="small" x="28" y="70">typed, matched, saved</text>
      <g transform="translate(28 90)">
        <rect width="46" height="24" rx="12" fill="#7c65e8" opacity="0.9"/>
        <rect x="58" width="78" height="24" rx="12" fill="#7c65e8" opacity="0.45"/>
        <rect x="148" width="34" height="24" rx="12" fill="#7c65e8" opacity="0.25"/>
      </g>
    </g>

    <g transform="translate(948 236)">
      <rect width="164" height="112" rx="24" fill="#12212b"/>
      <circle cx="82" cy="44" r="26" fill="#2ebc8b"/>
      <path d="M69 43l9 9 19-22" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="43" y="90" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#ffffff">passes</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <g transform="translate(958 74)">
      <rect x="0" y="34" width="86" height="62" rx="16" fill="#ffffff"/>
      <path d="M22 34h42v-8c0-12-9-20-21-20s-21 8-21 20v8z" fill="none" stroke="#ffbd4a" stroke-width="9" stroke-linecap="round"/>
      <rect x="18" y="52" width="50" height="10" rx="5" fill="#f0a63b" opacity="0.5"/>
      <rect x="18" y="70" width="34" height="8" rx="4" fill="#f0a63b" opacity="0.35"/>
    </g>
    <g transform="translate(1044 118)">
      <rect width="72" height="54" rx="14" fill="#ffffff"/>
      <path d="M18 18h36M18 31h28" stroke="#7c65e8" stroke-width="7" stroke-linecap="round"/>
      <path d="M49 48l13 12v-18" fill="#ffffff"/>
    </g>
  </g>
</svg>
