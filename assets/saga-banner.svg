<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Saga</title>
  <desc id="desc">Saga — write your workflow as a story, run it against real code, and check the effects. A friendly dev-tool sibling in the Torus family.</desc>

  <defs>
    <!-- Wireframe-torus stroke fades, inked for a warm paper surface (a wink to the Torus parent) -->
    <linearGradient id="latFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A2E24" stop-opacity="0.12"/>
      <stop offset="25%"  stop-color="#3A2E24" stop-opacity="0.62"/>
      <stop offset="50%"  stop-color="#3A2E24" stop-opacity="0.12"/>
      <stop offset="75%"  stop-color="#3A2E24" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#3A2E24" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="eqFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E67E22" stop-opacity="0.45"/>
      <stop offset="22%"  stop-color="#E67E22" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#E67E22" stop-opacity="0.55"/>
      <stop offset="78%"  stop-color="#E67E22" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E67E22" stop-opacity="0.45"/>
    </linearGradient>

    <clipPath id="panel"><rect x="16" y="16" width="1168" height="348" rx="26"/></clipPath>
    <radialGradient id="warm" cx="20%" cy="24%" r="92%">
      <stop offset="0%"  stop-color="#FFF6EC"/>
      <stop offset="60%" stop-color="#FBF7F1"/>
      <stop offset="100%" stop-color="#F4EFE7"/>
    </radialGradient>
  </defs>

  <!-- Soft, rounded paper — warm and friendly -->
  <rect width="1200" height="380" rx="30" fill="#F1EBE2"/>
  <rect x="16" y="16" width="1168" height="348" rx="26" fill="url(#warm)" stroke="#3A2E24" stroke-opacity="0.10"/>

  <g clip-path="url(#panel)">
    <!-- A big, soft torus drifting off the corner — the family resemblance, kept playful and faint -->
    <g transform="translate(1150 338) rotate(-9)" opacity="0.5">
      <ellipse cx="0" cy="-70" rx="210" ry="66" fill="none" stroke="#E67E22" stroke-opacity="0.16" stroke-width="2"/>
      <ellipse cx="0" cy="0"   rx="250" ry="82" fill="none" stroke="#E67E22" stroke-opacity="0.20" stroke-width="2"/>
      <ellipse cx="0" cy="0"   rx="86"  ry="30" fill="none" stroke="#E67E22" stroke-opacity="0.20" stroke-width="2"/>
      <ellipse cx="0" cy="70"  rx="210" ry="66" fill="none" stroke="#E67E22" stroke-opacity="0.16" stroke-width="2"/>
    </g>
    <!-- little floating sparkles, just for fun -->
    <path d="M978 96 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z" fill="#E67E22" opacity="0.55"/>
    <path d="M1112 150 l3 6.5 6.5 3 -6.5 3 -3 6.5 -3 -6.5 -6.5 -3 6.5 -3 z" fill="#E8B27A" opacity="0.7"/>
  </g>

  <!-- Logo mark: a cute torus "donut" — rounder, warmer, with a tiny sparkle -->
  <g transform="translate(128 104)">
    <ellipse cx="0" cy="-16" rx="40" ry="15" fill="none" stroke="url(#latFade)" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="0" cy="0"   rx="47" ry="18" fill="none" stroke="url(#eqFade)"  stroke-width="4.5" stroke-linecap="round"/>
    <ellipse cx="0" cy="0"   rx="16" ry="6.5" fill="#E67E22" fill-opacity="0.14" stroke="#E67E22" stroke-width="2.4"/>
    <ellipse cx="0" cy="16"  rx="40" ry="15" fill="none" stroke="url(#latFade)" stroke-width="3" stroke-linecap="round"/>
    <path d="M44 -30 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="#E67E22"/>
  </g>

  <!-- Wordmark, with a friendly amber dot -->
  <text x="196" y="124" fill="#2A211A"
    font-family="'Space Grotesk', 'Geist', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="64" font-weight="700" letter-spacing="-0.015em">Saga</text>
  <circle cx="368" cy="116" r="7.5" fill="#E67E22"/>

  <!-- Friendly maker's mark instead of shouting the lineage -->
  <g transform="translate(948 58)" opacity="0.9">
    <ellipse cx="0" cy="-3.4" rx="9"  ry="3"   fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
    <ellipse cx="0" cy="0"    rx="11" ry="3.8" fill="none" stroke="#9A7B3C" stroke-width="1.4"/>
    <ellipse cx="0" cy="3.4"  rx="9"  ry="3"   fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
    <text x="20" y="5" fill="#9A7B3C"
      font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace"
      font-size="13" letter-spacing="0.04em">part of the Torus family</text>
  </g>

  <!-- Tagline — narrative and warm, because it's Saga -->
  <text x="100" y="194" fill="#5A4A3C"
    font-family="'IBM Plex Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="24" font-weight="400" letter-spacing="-0.005em">Tell your workflow as a story, then watch it run against real code.</text>

  <!-- The story, as a little hop-along flow -->
  <g font-family="'IBM Plex Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
     font-size="15" font-weight="500">
    <path d="M106 250 C 190 232, 220 232, 286 250 S 416 268, 482 250 S 612 232, 678 250"
          stroke="#E67E22" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"
          stroke-dasharray="1 9"/>

    <circle cx="106" cy="250" r="5" fill="#C98A53"/>
    <text x="106" y="282" fill="#6B5B4C" text-anchor="middle">write the story</text>

    <circle cx="294" cy="250" r="5" fill="#C98A53"/>
    <text x="294" y="282" fill="#6B5B4C" text-anchor="middle">run real code</text>

    <circle cx="482" cy="250" r="5" fill="#C98A53"/>
    <text x="482" y="282" fill="#6B5B4C" text-anchor="middle">check the effects</text>

    <!-- the happy ending -->
    <rect x="638" y="234" width="118" height="32" rx="16" fill="#E67E22" fill-opacity="0.12" stroke="#E67E22" stroke-opacity="0.5"/>
    <path d="M662 250 l5 6 11 -13" fill="none" stroke="#C56A15" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="687" y="255" fill="#C56A15" font-weight="600">passed</text>
  </g>

  <!-- A little terminal line: it's a dev tool, after all -->
  <text x="100" y="330" fill="#9A8B7C"
    font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="14" letter-spacing="0.01em"><tspan fill="#E67E22">$</tspan> bun run test:examples</text>
</svg>
